name: Publish CUE module

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish tagged module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up CUE
        uses: cue-lang/setup-cue@v1.0.0
        with:
          version: v0.16.1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        env:
          CUE_REGISTRY: |
            inline:
            moduleRegistries: {
              "ghcr.io/ciphax": {
                registry:    "ghcr.io/ciphax"
                stripPrefix: true
              }
            }
        run: cue mod publish "${GITHUB_REF_NAME}"
